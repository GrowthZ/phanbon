name: Deploy Landing Page to DigitalOcean

on:
  push:
    branches:
      - landing-variant-giat-tit
      - menvisinh2

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build
        env:
          VITE_APPSCRIPT_URL: ${{ secrets.VITE_APPSCRIPT_URL }}

      - name: Set Deployment Path based on Branch
        id: set-path
        run: |
          if [ "${{ github.ref_name }}" = "landing-variant-giat-tit" ]; then
            echo "target_dir=/var/www/biofarm" >> $GITHUB_OUTPUT
          else
            echo "target_dir=/var/www/channuoi" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to DigitalOcean Droplet via SSH
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "dist/"
          REMOTE_HOST: ${{ secrets.DROPLET_HOST }}
          REMOTE_USER: ${{ secrets.DROPLET_USER }}
          TARGET: ${{ steps.set-path.outputs.target_dir }}
